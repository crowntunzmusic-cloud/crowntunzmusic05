name = "crowntunzmusic"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Environment variables are injected at runtime by Cloudflare Pages.
# Set them in the Cloudflare Dashboard → Pages → crowntunz-music → Settings → Environment Variables.

[vars]
# Only non-secret values can go here. Secret values (service role key, R2 keys)
# must be added via the Cloudflare Dashboard or `wrangler pages secret put`.

# Cloudflare R2 binding for media storage (server-side only).
# This binds the R2 bucket to the `CROWNTUNZ_BUCKET` variable in the Pages Function.
# Uncomment and set the bucket name after creating the R2 bucket in your Cloudflare account.
# [[r2_buckets]]
# binding = "CROWNTUNZ_BUCKET"
# bucket_name = "crowntunz-music"

# Observability — logs are retained for 3 days by default.
[observability]
enabled = true
